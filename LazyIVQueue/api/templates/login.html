<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — LazyIVQueue</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 2rem 2.5rem;
        width: 340px;
      }
      h1 {
        text-align: center;
        font-size: 1.4rem;
        color: #38bdf8;
        margin-bottom: 1.5rem;
      }
      .error-msg {
        background: #7f1d1d;
        color: #fca5a5;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        text-align: center;
      }
      label {
        display: block;
        color: #94a3b8;
        font-size: 0.85rem;
        margin-bottom: 0.35rem;
      }
      input[type="password"] {
        width: 100%;
        background: #0f172a;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
        margin-bottom: 1.25rem;
      }
      input[type="password"]:focus {
        outline: none;
        border-color: #38bdf8;
      }
      button {
        width: 100%;
        background: #38bdf8;
        color: #0f172a;
        border: none;
        border-radius: 6px;
        padding: 0.6rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <form class="login-box" method="POST" action="/login">
      <h1>LazyIVQueue Admin</h1>
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <input type="hidden" name="next" value="{{ next_url }}" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required />
      <button type="submit">Log in</button>
    </form>
  </body>
</html>
